<!DOCTYPE html>
<html>
<head>
  <title>App Control Center</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    h2 {
      color: white;
      margin-bottom: 10px;
    }

    input, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #ff4ecb, #ff0080);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Create App</h2>
  <input id="app_id" placeholder="App ID">
  <input id="app_name" placeholder="App Name">
  <input id="version" placeholder="Version (1.0.0)">
  <button onclick="createApp()">Create App</button>

  <hr>

  <h2>Update Version</h2>
  <input id="u_app_id" placeholder="App ID">
  <input id="u_version" placeholder="New Version">
  <input id="u_min" placeholder="Min Version">
  <input id="apk_url" placeholder="APK URL">
  <textarea id="changelog" placeholder="Changelog"></textarea>
  <button onclick="updateApp()">Update</button>

  <hr>

  <h2>Add Notification</h2>
  <input id="n_app_id" placeholder="App ID">
  <input id="title" placeholder="Title">
  <input id="message" placeholder="Message">
  <button onclick="addNotification()">Add</button>

</div>

<script>

async function createApp() {
  await fetch('/api/create-app', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      app_id: val("app_id"),
      app_name: val("app_name"),
      version: val("version")
    })
  });

  alert("App created!");
}

async function updateApp() {
  await fetch('/api/update-app', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      app_id: val("u_app_id"),
      version: val("u_version"),
      min_version: val("u_min"),
      apk_url: val("apk_url"),
      changelog: val("changelog"),
      force_update: true
    })
  });

  alert("Updated!");
}

async function addNotification() {
  await fetch('/api/add-notification', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      app_id: val("n_app_id"),
      title: val("title"),
      message: val("message")
    })
  });

  alert("Notification added!");
}

function val(id) {
  return document.getElementById(id).value;
}

</script>

</body>
</html>
